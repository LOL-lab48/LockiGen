<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="google-site-verification" content="i2VyhV8j9lk5nHaVbjk-cODSySED9lEjf4_djFQ1g30" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LockiGen – Password Generator</title>

  <!-- Favicon PNGs -->
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />

  <link rel="stylesheet" href="style.css" />

  <style>
    footer{
      margin-top:60px;
      text-align:center;
      font-size:14px;
      color:#94a3b8;
    }

    footer a{
      color:#94a3b8;
      text-decoration:none;
    }

    footer a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>LockiGen</h1>
    <p>Generate strong passwords instantly!</p>

    <label for="length">Password Length:</label>
    <input type="number" id="length" value="12" min="6" max="32" />

    <div class="options">
      <label><input type="checkbox" id="uppercase" checked /> Uppercase</label>
      <label><input type="checkbox" id="numbers" checked /> Numbers</label>
      <label><input type="checkbox" id="symbols" checked /> Symbols</label>
    </div>

    <button id="generate">Generate Password</button>

    <div id="output"></div>

    <div id="strength">
      <div id="strength-bar"></div>
      <span id="strength-text"></span>
    </div>

    <button id="copy" style="display:none;">Copy to Clipboard</button>
  </div>

  <footer>
    <p>© 2026 LOL Labs</p>
    <p>
      <a href="https://lol-lab48.github.io/lol-labs/">LOL Labs Homepage</a>
    </p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
